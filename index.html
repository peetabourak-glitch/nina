<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nina 💕</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

img {
  width: 100%;
  border-radius: 20px;
  margin-bottom: 10px;
}

.chat {
  margin-top: 20px;
  min-height: 120px;
}

.message {
  padding: 10px;
  border-radius: 12px;
  margin: 8px 0;
  max-width: 75%;
  line-height: 1.4;
  word-wrap: break-word;
}

.ai {
  background: #1f1f1f;
}

.user {
  background: #ff4d6d;
  margin-left: auto;
}

.input-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: pink;
  cursor: pointer;
  font-size: 16px;
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.paywall {
  display: none;
  text-align: center;
  margin-top: 20px;
}

.status {
  opacity: 0.7;
  font-size: 14px;
  margin-top: 8px;
}
</style>
</head>

  <h2>Nina 💕</h2>
  <p>your private AI girlfriend</p>

  <div class="chat" id="chat">
    <div class="message ai">hey... i was waiting for you 🖤</div>
  </div>

  <div class="input-row">
    <input id="input" placeholder="type something...">
    <button id="sendBtn" onclick="send()">➤</button>
  </div>

  <div class="status" id="status"></div>

  <div class="paywall" id="paywall">
    <p>💔 continue chatting by unlocking Nina</p>
    <button onclick="unlock()">Unlock 💕</button>
  </div>

</div>

<script>
let count = 0;
let locked = false;

function addMessage(role, text) {
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message " + role;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessageToAI(text) {
  const res = await fetch("/.netlify/functions/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.error || "Request failed");
  }

  return data.reply;
}

async function send() {
  if (locked) return;

  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const status = document.getElementById("status");
  const text = input.value.trim();

  if (!text) return;

  addMessage("user", text);
  input.value = "";

  count++;
  if (count >= 4) {
    locked = true;
    document.getElementById("paywall").style.display = "block";
  }

  sendBtn.disabled = true;
  status.innerText = "Nina is typing...";

  try {
    const reply = await sendMessageToAI(text);
    addMessage("ai", reply);
  } catch (error) {
    addMessage("ai", "mm... something went wrong. try again for me? 🖤");
    console.error(error);
  } finally {
    sendBtn.disabled = false;
    status.innerText = "";
  }
}

function unlock() {
  alert("payment system coming soon 😉");
}

document.getElementById("input").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    send();
  }
});
</script>

</body>
