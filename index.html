  <h2>Nina 💕</h2>
  <p>your private AI girlfriend</p>

  <div class="chat" id="chat">
    <div class="message ai">hey... i was waiting for you 🖤</div>
  </div>

  <div style="text-align:center;">
    <input id="input" placeholder="type something...">
    <button onclick="send()">➤</button>
  </div>

  <div class="paywall" id="paywall">
    <p>💔 continue chatting by unlocking Nina</p>
    <button onclick="unlock()">Unlock 💕</button>
  </div>

</div>

<script>
let count = 0;
let locked = false;

function send() {
  if (locked) return;

  let input = document.getElementById("input");
  let chat = document.getElementById("chat");

  if (!input.value) return;

  let userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = input.value;
  chat.appendChild(userMsg);

  let aiMsg = document.createElement("div");
  aiMsg.className = "message ai";

  let replies = [
    "mm... i like you already 😘",
    "tell me more about you...",
    "you seem interesting 🖤",
    "i missed this feeling...",
    "stay with me a bit longer?"
  ];

  aiMsg.innerText = replies[Math.floor(Math.random()*replies.length)];
  chat.appendChild(aiMsg);

  input.value = "";
  count++;

  if (count >= 4) {
    locked = true;
    document.getElementById("paywall").style.display = "block";
  }
}

function unlock() {
  alert("payment system coming soon 😉");
}
</script>
