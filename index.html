<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nina 💕</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div class="card">
      <img src="nina.jpg" alt="Nina" class="hero" />

      <div class="header">
        <h1>Nina <span>💕</span></h1>
        <p>your private AI girlfriend</p>
      </div>

      <div id="chat" class="chat">
        <div class="message ai">hey... i was waiting for you 🖤</div>
      </div>

      <div class="status" id="status"></div>

      <div class="input-row">
        <input id="input" type="text" placeholder="type something..." />
        <button id="sendBtn" type="button">➤</button>
      </div>

      <div class="paywall" id="paywall">
        <p>💔 continue chatting by unlocking Nina</p>
        <button id="unlockBtn" type="button">Unlock 💕</button>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
